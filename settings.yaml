# Infantry Unit Structure Configuration
# Based on WWII triangular division organization

units:
  # Basic tactical unit - smallest controllable formation
  squad:
    size: 10  # 8-12 men, using middle value
    leadership: "Sergeant"
    description: "Basic tactical unit built around central weapon system"
    weapon_focus: "Light machine gun or semi-automatic rifles"

  # Platoon level - three squads + HQ
  platoon:
    size: 35  # 30-40 men, using middle value
    leadership: "Lieutenant"
    description: "Three rifle squads plus small headquarters element"
    composition:
      squads: 3
      headquarters: 1
    special_equipment: ["light mortar", "heavy weapons team"]

  # Company level - three platoons + heavy weapons
  company:
    size: 160  # 120-200 men, using middle value
    leadership: "Captain"
    description: "Three rifle platoons plus heavy weapons and HQ"
    composition:
      rifle_platoons: 3
      heavy_weapons_platoon: 1
      headquarters: 1
    weapons: ["heavy machine guns", "mortars"]

  # Battalion level - three companies + support
  battalion:
    size: 900  # 800-1000 men, using middle value
    leadership: "Lieutenant Colonel"
    description: "Three rifle companies plus heavy weapons and HQ/supply"
    composition:
      rifle_companies: 3
      heavy_weapons_company: 1
      headquarters_company: 1
    staff: true  # Lowest level with dedicated staff

  # Regiment/Brigade level - three battalions + support
  regiment:
    size: 2750  # 2500-3000 men, using middle value
    leadership: "Colonel"
    description: "Three infantry battalions with anti-tank and cannon support"
    composition:
      infantry_battalions: 3
      anti_tank_company: 1
      cannon_company: 1

  # Division level - full independent operations capability
  division:
    size: 13500  # 12000-15000 men, using middle value
    leadership: "Major General"
    description: "Three infantry regiments with full combined arms support"
    composition:
      infantry_regiments: 3
      artillery_battalions: 4  # 3 light howitzer + 1 medium howitzer
      engineer_battalion: 1
      reconnaissance_troop: 1
      support_companies:
        - "medical"
        - "signals"
        - "quartermaster"
        - "ordnance"
        - "military police"
    independent_operations: true

# Command and Control System
command_structure:
  # Units with HQ can be directly controlled by player
  controllable_units:
    - "platoon"    # Has small headquarters element
    - "company"    # Has headquarters unit
    - "battalion"  # Has headquarters/supply company
    - "regiment"   # Has regimental headquarters
    - "division"   # Has divisional headquarters

  # Units without HQ move autonomously but cannot receive direct orders
  autonomous_units:
    - "squad"      # No HQ - follows platoon or moves independently

  # Command hierarchy - who can give orders to whom
  chain_of_command:
    platoon: ["squad"]
    company: ["platoon", "squad"]
    battalion: ["company", "platoon", "squad"]
    regiment: ["battalion", "company", "platoon", "squad"]
    division: ["regiment", "battalion", "company", "platoon", "squad"]

# Game progression tiers (from memory notes)
game_tiers:
  tactical_atom: "platoon"  # Smallest meaningful tactical unit for gameplay
  nlp_command_level: "company"  # Natural language command interface target
  strategic_planning: "regiment"  # High-level strategic decisions
  campaign_operations: "division"  # Full independent campaign capability

# Triangular organization principle
organization_principle: "triangular"
description: "Each level contains three units of the level below (3 squads -> platoon, 3 platoons -> company, etc.)"

# Formation Configurations
formations:
  squad:
    marching:
      name: "Squad Marching Formation"
      description: "Two-rank formation for movement"
      pattern:
        - ["rifleman", "rifleman", "mg", "rifleman", "rifleman"]
        - ["rifleman", "rifleman", "hq", "rifleman", "rifleman"]
      spacing:
        x: 3.0  # meters between soldiers horizontally
        y: 3.0  # meters between ranks vertically
      dimensions:
        cols: 5
        rows: 2

  platoon:
    marching:
      name: "Platoon Column Formation"
      description: "Three squads in line with HQ element behind center"
      squad_spacing:
        x: 20.0  # meters between squads horizontally
        y: 0.0   # squads aligned horizontally
      hq_element:
        pattern: [["hq", "hq", "mortar", "rifleman", "rifleman"]]  # Lt, Sgt, Mortar team
        spacing: {"x": 3.0, "y": 3.0}
        position: "center_rear"  # behind center squad
        offset: {"x": 0, "y": 15}  # 15m behind center squad

    wedge:
      name: "Platoon Wedge Formation"
      description: "Tactical wedge for advancing under fire"
      squad_positions:
        - {"x": 0, "y": -20}      # Lead squad (point of wedge)
        - {"x": -25, "y": 10}     # Left rear squad
        - {"x": 25, "y": 10}      # Right rear squad
      hq_element:
        pattern: [["hq", "hq", "mortar", "rifleman", "rifleman"]]
        spacing: {"x": 3.0, "y": 3.0}
        position: "center"
        offset: {"x": 0, "y": 0}  # Center of triangle

    line:
      name: "Platoon Line Formation"
      description: "Extended line for maximum firepower"
      squad_spacing:
        x: 30.0  # wider spacing for line
        y: 0.0
      hq_element:
        pattern: [["hq", "hq", "mortar", "rifleman", "rifleman"]]
        spacing: {"x": 3.0, "y": 3.0}
        position: "center_rear"
        offset: {"x": 0, "y": 20}  # further back in line formation

  company:
    marching:
      name: "Company Approach March"
      description: "Three rifle platoons in triangle, HQ and heavy weapons in rear"
      rifle_platoons:
        formation: "triangle"
        positions:
          - {"x": 0, "y": -40}      # Lead platoon
          - {"x": -35, "y": 20}     # Left rear platoon
          - {"x": 35, "y": 20}      # Right rear platoon
      company_hq:
        pattern: [["hq", "hq", "hq", "rifleman", "rifleman"]]
        spacing: {"x": 3.0, "y": 3.0}
        position: {"x": 0, "y": 50}  # Behind triangle
      heavy_weapons_platoon:
        elements:
          mg_section:
            pattern: [["mg", "rifleman", "mg", "rifleman"], ["hq", "rifleman", "rifleman", "rifleman"]]
            position: {"x": -20, "y": 45}
          mortar_section:
            pattern: [["mortar", "rifleman", "mortar", "rifleman"], ["hq", "rifleman", "rifleman", "rifleman"]]
            position: {"x": 20, "y": 45}

    assault:
      name: "Company Assault Formation"
      description: "Line formation for maximum firepower"
      rifle_platoons:
        formation: "line"
        positions:
          - {"x": -60, "y": 0}      # Left platoon
          - {"x": 0, "y": 0}        # Center platoon
          - {"x": 60, "y": 0}       # Right platoon
      company_hq:
        pattern: [["hq", "hq", "hq", "rifleman", "rifleman"]]
        spacing: {"x": 3.0, "y": 3.0}
        position: {"x": 0, "y": 40}  # Behind line
      heavy_weapons_platoon:
        elements:
          mg_section:
            pattern: [["mg", "rifleman", "mg", "rifleman"], ["hq", "rifleman", "rifleman", "rifleman"]]
            position: {"x": -30, "y": 35}  # Support from flanks
          mortar_section:
            pattern: [["mortar", "rifleman", "mortar", "rifleman"], ["hq", "rifleman", "rifleman", "rifleman"]]
            position: {"x": 30, "y": 60}   # Further back for indirect fire

    defense:
      name: "Company Defensive Position"
      description: "Distributed defense with interlocking fields of fire"
      rifle_platoons:
        formation: "distributed"
        positions:
          - {"x": -50, "y": -10}    # Left strongpoint
          - {"x": 50, "y": -10}     # Right strongpoint
          - {"x": 0, "y": 30}       # Reserve position
      company_hq:
        pattern: [["hq", "hq", "hq", "rifleman", "rifleman"]]
        spacing: {"x": 3.0, "y": 3.0}
        position: {"x": 0, "y": 45}  # Command post
      heavy_weapons_platoon:
        elements:
          mg_section:
            pattern: [["mg", "rifleman", "mg", "rifleman"], ["hq", "rifleman", "rifleman", "rifleman"]]
            position: {"x": 0, "y": 15}   # Central fire support
          mortar_section:
            pattern: [["mortar", "rifleman", "mortar", "rifleman"], ["hq", "rifleman", "rifleman", "rifleman"]]
            position: {"x": 0, "y": 60}   # Rear area fires

# Movement and Speed System
movement:
  base_speed: 2.2  # meters per second on flat ground (quick march pace)
  slope_penalty: 150.0  # speed multiplier reduction per unit of uphill slope
  min_speed_fraction: 0.2  # floor: unit never moves slower than 20% of base speed

  # Heavy weapons movement penalties
  # Unit moves at the speed of its slowest member (realistic military doctrine)
  heavy_weapon_penalties:
    rifleman: 1.0    # No penalty - baseline speed
    hq: 1.0          # Officers/NCOs move at normal pace
    mg: 0.75         # Machine gun teams 25% slower (heavy weapon + ammo)
    mortar: 0.6      # Mortar teams 40% slower (heaviest weapon + rounds)

# Gameplay Mechanics
autonomous_behavior:
  description: "Units without HQ move independently through terrain but cannot receive player orders"
  squad_behavior:
    - "Follow nearest friendly platoon if available"
    - "Seek cover when under fire"
    - "Maintain formation cohesion"
    - "React to immediate threats"
    - "Move toward last known objective"

  ai_decision_making:
    - "Terrain navigation (avoid obstacles, use cover)"
    - "Self-preservation (retreat when outnumbered)"
    - "Local tactical decisions (flanking, suppression)"
    - "Cannot receive strategic orders from player"

# Historical context
historical_basis: "WWII triangular division structure"
notes:
  - "Division was smallest formation capable of independent operations"
  - "All major powers used variations of triangular structure"
  - "Numbers varied by nation and war period"
  - "US divisions were heavily motorized with strong artillery support"
  - "German late-war divisions reduced to 6 battalions (Volksgrenadier model)"
  - "Soviet rifle divisions were smaller (5000-8000) but massed in larger formations"
  - "Squads operate autonomously when separated from command structure"